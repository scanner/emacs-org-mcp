---
kind: pipeline
name: emacs-org-mcp Tests

# Temp volume is ephemeral per-run shared mount.  The lint step populates
# the venv; the test step reuses it without re-running `uv sync`.
#
volumes:
  - name: python-venv
    temp: {}

steps:
  - name: lint
    # NOTE: Keep this version in sync with requires-python in pyproject.toml
    image: "python:3.13.12"
    volumes:
      - name: python-venv
        path: /drone/src/.venv
    environment:
      PYTHONUNBUFFERED: 1
      UV_LINK_MODE: copy
    commands:
      - pip install uv
      - uv sync --frozen --extra dev
      - uv run ruff check .
      - uv run ruff format --check .
      - uv run mypy .

  - name: test
    image: "python:3.13.12"
    depends_on:
      - lint
    volumes:
      - name: python-venv
        path: /drone/src/.venv
    environment:
      PYTHONUNBUFFERED: 1
      UV_LINK_MODE: copy
    commands:
      - pip install uv
      - uv run pytest -v

---
kind: pipeline
name: Build Notify

depends_on:
  - emacs-org-mcp Tests

trigger:
  status:
    - success
    - failure

steps:
  - name: slack notification
    image: plugins/slack
    settings:
      webhook:
        from_secret: slack_notify_webhook
      channel: builds
      username: drone
      template: >-
        {{#if build.pull }}
          *{{#success build.status }}✔{{ else }}✘{{/success }} {{ uppercasefirst build.status }}*: <https://github.com/{{ repo.owner }}/{{ repo.name }}/pull/{{ build.pull }}|Pull Request {{ build.pull }}>
        {{ else }}
          *{{#success build.status }}✔{{ else }}✘{{/success }} {{ uppercasefirst build.status }}: Build {{ build.number }}* (type: `{{ build.event }}`)
        {{/if }}

        Repository: <https://github.com/{{ repo.owner }}/{{ repo.name }}|{{ repo.name }}>

        Commit message: {{ build.message }}

        Commit: <https://github.com/{{ repo.owner }}/{{ repo.name }}/commit/{{ build.commit }}|{{ truncate build.commit 8 }}>

        Branch: <https://github.com/{{ repo.owner }}/{{ repo.name }}/commits/{{ build.branch }}|{{ build.branch }}>

        Author: {{ build.author }}

        Duration: {{ since build.started }}

        <{{ build.link }}|Visit build page ↗>
